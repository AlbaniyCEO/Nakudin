kind = "web"
previewPath = "/"
title = "Nakudin Marketplace"
version = "1.0.0"
id = "artifacts/nakudin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21551

[services.development]
run = "pnpm --filter @workspace/nakudin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nakudin", "run", "build" ]
publicDir = "artifacts/nakudin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21551"
BASE_PATH = "/"
