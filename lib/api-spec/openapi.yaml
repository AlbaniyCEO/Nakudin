openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nakudin Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: feed
    description: Product feed
  - name: products
    description: Product management
  - name: shops
    description: Shop management
  - name: social
    description: Likes, follows, comments, reviews
  - name: search
    description: Search
  - name: analytics
    description: Shop analytics
  - name: admin
    description: Admin operations
  - name: cloudinary
    description: Image upload helpers

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /feed:
    get:
      operationId: getFeed
      tags: [feed]
      summary: Get personalized product feed
      parameters:
        - in: query
          name: lat
          schema: { type: ["number", "null"] }
        - in: query
          name: lng
          schema: { type: ["number", "null"] }
        - in: query
          name: category
          schema: { type: ["string", "null"] }
        - in: query
          name: cursor
          schema: { type: ["string", "null"] }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Feed page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPage"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - in: query
          name: shopId
          schema: { type: ["string", "null"] }
        - in: query
          name: category
          schema: { type: ["string", "null"] }
        - in: query
          name: cursor
          schema: { type: ["string", "null"] }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"

    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /products/{productId}/like:
    post:
      operationId: likeProduct
      tags: [social]
      summary: Like a product
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Liked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResult"

    delete:
      operationId: unlikeProduct
      tags: [social]
      summary: Unlike a product
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Unliked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResult"

  /products/{productId}/comments:
    get:
      operationId: getProductComments
      tags: [social]
      summary: Get comments for a product
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

    post:
      operationId: createComment
      tags: [social]
      summary: Post a comment on a product
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /products/{productId}/whatsapp-click:
    post:
      operationId: logWhatsappClick
      tags: [social]
      summary: Log a WhatsApp button click
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsappClickInput"
      responses:
        "200":
          description: Logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsappClickResult"

  /products/{productId}/related:
    get:
      operationId: getRelatedProducts
      tags: [products]
      summary: Get related products
      parameters:
        - in: path
          name: productId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Related products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedProduct"

  /shops:
    get:
      operationId: listShops
      tags: [shops]
      summary: List shops
      parameters:
        - in: query
          name: cursor
          schema: { type: ["string", "null"] }
        - in: query
          name: category
          schema: { type: ["string", "null"] }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Shop list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopPage"

    post:
      operationId: createShop
      tags: [shops]
      summary: Create a shop (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopInput"
      responses:
        "201":
          description: Shop created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/check-name:
    get:
      operationId: checkBusinessName
      tags: [shops]
      summary: Check if a business name is available
      parameters:
        - in: query
          name: name
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Name availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NameAvailability"

  /shops/me:
    get:
      operationId: getMyShop
      tags: [shops]
      summary: Get authenticated user's shop
      responses:
        "200":
          description: My shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

    patch:
      operationId: updateMyShop
      tags: [shops]
      summary: Update authenticated user's shop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/{shopId}:
    get:
      operationId: getShop
      tags: [shops]
      summary: Get a shop by ID
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shops/{shopId}/follow:
    post:
      operationId: followShop
      tags: [social]
      summary: Follow a shop
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Followed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResult"

    delete:
      operationId: unfollowShop
      tags: [social]
      summary: Unfollow a shop
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Unfollowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FollowResult"

  /shops/{shopId}/reviews:
    get:
      operationId: getShopReviews
      tags: [social]
      summary: Get reviews for a shop
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

    post:
      operationId: createReview
      tags: [social]
      summary: Post a review for a shop
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /shops/{shopId}/can-review:
    get:
      operationId: canReviewShop
      tags: [social]
      summary: Check if user can review this shop
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Can review status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanReviewResult"

  /shops/{shopId}/analytics:
    get:
      operationId: getShopAnalytics
      tags: [analytics]
      summary: Get analytics for a shop
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopAnalytics"

  /search:
    get:
      operationId: search
      tags: [search]
      summary: Search products and shops
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema:
            type: string
            enum: [products, shops, all]
            default: all
        - in: query
          name: category
          schema: { type: ["string", "null"] }
        - in: query
          name: lat
          schema: { type: ["number", "null"] }
        - in: query
          name: lng
          schema: { type: ["number", "null"] }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /reports:
    post:
      operationId: createReport
      tags: [social]
      summary: Report a shop or product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /cloudinary/signature:
    post:
      operationId: getCloudinarySignature
      tags: [cloudinary]
      summary: Get a signed upload signature for Cloudinary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloudinarySignatureRequest"
      responses:
        "200":
          description: Signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloudinarySignature"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin overview stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/shops:
    get:
      operationId: adminListShops
      tags: [admin]
      summary: Admin — list all shops
      parameters:
        - in: query
          name: cursor
          schema: { type: ["string", "null"] }
        - in: query
          name: status
          schema: { type: ["string", "null"] }
        - in: query
          name: q
          schema: { type: ["string", "null"] }
        - in: query
          name: limit
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: Admin shop list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminShopPage"

  /admin/shops/{shopId}:
    patch:
      operationId: adminUpdateShop
      tags: [admin]
      summary: Admin — update a shop (verify, suspend, adjust status)
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminShopUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

    delete:
      operationId: adminDeleteShop
      tags: [admin]
      summary: Admin — delete a shop
      parameters:
        - in: path
          name: shopId
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      summary: Admin — list all products
      parameters:
        - in: query
          name: cursor
          schema: { type: ["string", "null"] }
        - in: query
          name: q
          schema: { type: ["string", "null"] }
        - in: query
          name: limit
          schema: { type: integer, default: 30 }
      responses:
        "200":
          description: Admin product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProductPage"

  /admin/reports:
    get:
      operationId: adminListReports
      tags: [admin]
      summary: Admin — list all reports
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, reviewed, dismissed]
            default: open
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"

  /admin/reports/{reportId}:
    patch:
      operationId: adminUpdateReport
      tags: [admin]
      summary: Admin — update report status
      parameters:
        - in: path
          name: reportId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    FeedProduct:
      type: object
      required: [id, title, price, images, likeCount, viewCount, shopId, shopName, shopVerified, createdAt]
      properties:
        id: { type: string }
        title: { type: string }
        price: { type: number }
        images: { type: array, items: { type: string } }
        likeCount: { type: integer }
        viewCount: { type: integer }
        shopId: { type: string }
        shopName: { type: string }
        shopVerified: { type: boolean }
        shopLogoUrl: { type: ["string", "null"] }
        shopWhatsapp: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        locationCity: { type: ["string", "null"] }
        locationState: { type: ["string", "null"] }
        distanceKm: { type: ["number", "null"] }
        isLiked: { type: boolean }
        isFollowed: { type: boolean }
        trendScore: { type: ["number", "null"] }
        createdAt: { type: string }

    FeedPage:
      type: object
      required: [products, nextCursor]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/FeedProduct"
        nextCursor: { type: ["string", "null"] }

    Product:
      type: object
      required: [id, shopId, title, price, images, likeCount, viewCount, whatsappClickCount, status, createdAt]
      properties:
        id: { type: string }
        shopId: { type: string }
        title: { type: string }
        description: { type: ["string", "null"] }
        price: { type: number }
        images: { type: array, items: { type: string } }
        category: { type: ["string", "null"] }
        locationCity: { type: ["string", "null"] }
        locationState: { type: ["string", "null"] }
        locationLat: { type: ["number", "null"] }
        locationLng: { type: ["number", "null"] }
        likeCount: { type: integer }
        viewCount: { type: integer }
        whatsappClickCount: { type: integer }
        trendScore: { type: ["number", "null"] }
        status: { type: string, enum: [active, hidden, deleted] }
        isLiked: { type: boolean }
        createdAt: { type: string }

    ProductInput:
      type: object
      required: [title, price, images]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        price: { type: number, minimum: 0 }
        images: { type: array, items: { type: string }, maxItems: 6 }
        category: { type: string }
        locationCity: { type: string }
        locationState: { type: string }
        locationLat: { type: number }
        locationLng: { type: number }

    ProductUpdate:
      type: object
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        price: { type: number, minimum: 0 }
        images: { type: array, items: { type: string }, maxItems: 6 }
        category: { type: string }
        status: { type: string, enum: [active, hidden] }
        locationCity: { type: string }
        locationState: { type: string }

    ProductPage:
      type: object
      required: [products, nextCursor]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        nextCursor: { type: ["string", "null"] }

    Shop:
      type: object
      required: [id, businessName, category, followerCount, followingCount, verified, subscriptionStatus, createdAt]
      properties:
        id: { type: string }
        businessName: { type: string }
        bio: { type: ["string", "null"] }
        category: { type: string }
        logoUrl: { type: ["string", "null"] }
        coverUrl: { type: ["string", "null"] }
        whatsappNumber: { type: ["string", "null"] }
        locationCity: { type: ["string", "null"] }
        locationState: { type: ["string", "null"] }
        locationLat: { type: ["number", "null"] }
        locationLng: { type: ["number", "null"] }
        verified: { type: boolean }
        followerCount: { type: integer }
        followingCount: { type: integer }
        totalViews: { type: integer }
        totalLikes: { type: integer }
        totalWhatsappClicks: { type: integer }
        avgRating: { type: ["number", "null"] }
        reviewCount: { type: integer }
        subscriptionStatus: { type: string, enum: [trial, active, grace, locked] }
        trialEndsAt: { type: ["string", "null"] }
        isFollowed: { type: boolean }
        createdAt: { type: string }

    ShopInput:
      type: object
      required: [businessName, whatsappNumber, category]
      properties:
        businessName: { type: string, minLength: 2 }
        whatsappNumber: { type: string }
        category: { type: string }
        bio: { type: string }
        logoUrl: { type: string }
        coverUrl: { type: string }
        locationCity: { type: string }
        locationState: { type: string }
        locationLat: { type: number }
        locationLng: { type: number }

    ShopUpdate:
      type: object
      properties:
        businessName: { type: string, minLength: 2 }
        whatsappNumber: { type: string }
        category: { type: string }
        bio: { type: string }
        logoUrl: { type: string }
        coverUrl: { type: string }
        locationCity: { type: string }
        locationState: { type: string }
        locationLat: { type: number }
        locationLng: { type: number }

    ShopPage:
      type: object
      required: [shops, nextCursor]
      properties:
        shops:
          type: array
          items:
            $ref: "#/components/schemas/Shop"
        nextCursor: { type: ["string", "null"] }

    NameAvailability:
      type: object
      required: [available]
      properties:
        available: { type: boolean }

    LikeResult:
      type: object
      required: [liked, likeCount]
      properties:
        liked: { type: boolean }
        likeCount: { type: integer }

    FollowResult:
      type: object
      required: [followed, followerCount]
      properties:
        followed: { type: boolean }
        followerCount: { type: integer }

    CanReviewResult:
      type: object
      required: [canReview]
      properties:
        canReview: { type: boolean }

    Comment:
      type: object
      required: [id, productId, authorId, authorName, text, createdAt]
      properties:
        id: { type: string }
        productId: { type: string }
        authorId: { type: string }
        authorName: { type: string }
        authorLogoUrl: { type: ["string", "null"] }
        text: { type: string }
        createdAt: { type: string }

    CommentInput:
      type: object
      required: [text]
      properties:
        text: { type: string, minLength: 1 }

    Review:
      type: object
      required: [id, shopId, authorId, authorName, rating, createdAt]
      properties:
        id: { type: string }
        shopId: { type: string }
        authorId: { type: string }
        authorName: { type: string }
        authorLogoUrl: { type: ["string", "null"] }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: ["string", "null"] }
        ownerReply: { type: ["string", "null"] }
        createdAt: { type: string }

    ReviewInput:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }

    WhatsappClickInput:
      type: object
      required: [deviceId]
      properties:
        deviceId: { type: string }

    WhatsappClickResult:
      type: object
      required: [logged]
      properties:
        logged: { type: boolean }

    Report:
      type: object
      required: [id, targetType, targetId, reason, status, createdAt]
      properties:
        id: { type: string }
        targetType: { type: string, enum: [shop, product] }
        targetId: { type: string }
        reporterUid: { type: ["string", "null"] }
        reason: { type: string }
        details: { type: ["string", "null"] }
        status: { type: string, enum: [open, reviewed, dismissed] }
        createdAt: { type: string }

    ReportInput:
      type: object
      required: [targetType, targetId, reason]
      properties:
        targetType: { type: string, enum: [shop, product] }
        targetId: { type: string }
        reason: { type: string }
        details: { type: string }

    ReportStatusUpdate:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [reviewed, dismissed] }

    ShopAnalytics:
      type: object
      required: [shopId, totalViews, totalLikes, totalWhatsappClicks, followerCount, recentActivity]
      properties:
        shopId: { type: string }
        totalViews: { type: integer }
        totalLikes: { type: integer }
        totalWhatsappClicks: { type: integer }
        followerCount: { type: integer }
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityPoint"
        topProducts:
          type: array
          items:
            $ref: "#/components/schemas/ProductStat"

    ActivityPoint:
      type: object
      required: [date, views, likes, clicks]
      properties:
        date: { type: string }
        views: { type: integer }
        likes: { type: integer }
        clicks: { type: integer }

    ProductStat:
      type: object
      required: [productId, title, views, likes, clicks]
      properties:
        productId: { type: string }
        title: { type: string }
        views: { type: integer }
        likes: { type: integer }
        clicks: { type: integer }

    SearchResults:
      type: object
      required: [products, shops]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/FeedProduct"
        shops:
          type: array
          items:
            $ref: "#/components/schemas/Shop"

    CloudinarySignatureRequest:
      type: object
      properties:
        folder: { type: string }

    CloudinarySignature:
      type: object
      required: [signature, timestamp, apiKey, cloudName, uploadPreset]
      properties:
        signature: { type: string }
        timestamp: { type: integer }
        apiKey: { type: string }
        cloudName: { type: string }
        uploadPreset: { type: string }

    AdminStats:
      type: object
      required: [totalShops, totalProducts, totalUsers, totalReports, subscriptionBreakdown]
      properties:
        totalShops: { type: integer }
        totalProducts: { type: integer }
        totalUsers: { type: integer }
        totalReports: { type: integer }
        revenueThisMonth: { type: number }
        whatsappClicksToday: { type: integer }
        newSignupsThisWeek: { type: integer }
        subscriptionBreakdown:
          type: object
          properties:
            trial: { type: integer }
            active: { type: integer }
            grace: { type: integer }
            locked: { type: integer }
          required: [trial, active, grace, locked]

    AdminShopPage:
      type: object
      required: [shops, nextCursor]
      properties:
        shops:
          type: array
          items:
            $ref: "#/components/schemas/Shop"
        nextCursor: { type: ["string", "null"] }

    AdminProductPage:
      type: object
      required: [products, nextCursor]
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        nextCursor: { type: ["string", "null"] }

    AdminShopUpdate:
      type: object
      properties:
        verified: { type: boolean }
        subscriptionStatus: { type: string, enum: [trial, active, grace, locked] }
        suspended: { type: boolean }
